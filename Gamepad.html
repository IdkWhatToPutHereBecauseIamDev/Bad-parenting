<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #toggle { position: fixed; top: 15px; left: 15px; z-index: 1000; padding: 10px; background: #333; color: #fff; border: 1px solid #777; border-radius: 5px; opacity: 0.6; }
        #pad-overlay { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        #pad-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* Joystick */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border: 2px solid #666; border-radius: 50%; }
        #joy-knob { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.8; }

        /* Triggers */
        .trig { position: absolute; top: 60px; width: 80px; height: 45px; background: rgba(255,255,255,0.1); border: 1px solid #666; color: #fff; border-radius: 5px; }
        #trig-l { left: 40px; } #trig-r { right: 40px; }

        /* Action Buttons */
        .btn-grid { position: absolute; bottom: 40px; right: 40px; display: grid; grid-template-columns: 70px 70px; gap: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 1px solid #888; border-radius: 50%; color: #fff; font-weight: bold; font-size: 18px; }
        .btn:active, .trig:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<button id="toggle">CONTROLS</button>

<div id="pad-overlay">
    <button class="trig" id="trig-l" data-key="Shift">SHIFT</button>
    <button class="trig" id="trig-r" data-key="Control">CTRL</button>

    <div id="joy-base"><div id="joy-knob"></div></div>

    <div class="btn-grid">
        <button class="btn" data-key="q">Q</button>
        <button class="btn" data-key="e">E</button>
        <button class="btn" data-key="f">F</button>
        <button class="btn" data-key=" ">SPACE</button>
    </div>
</div>

<script>
    const overlay = document.getElementById('pad-overlay');
    const knob = document.getElementById('joy-knob');
    const base = document.getElementById('joy-base');
    
    // Toggle Visibility
    document.getElementById('toggle').onclick = () => overlay.classList.toggle('active');

    // Helper to simulate keyboard
    const emitKey = (key, type) => {
        window.dispatchEvent(new KeyboardEvent(type, { key: key, bubbles: true }));
    };

    // Button Events
    document.querySelectorAll('.btn, .trig').forEach(b => {
        const key = b.getAttribute('data-key');
        b.ontouchstart = (e) => { e.preventDefault(); emitKey(key, 'keydown'); };
        b.ontouchend = (e) => { e.preventDefault(); emitKey(key, 'keyup'); };
    });

    // Joystick -> WASD Logic
    let dragging = false;
    let activeKeys = { w: false, a: false, s: false, d: false };

    const handleJoystick = (e) => {
        if (!dragging) return;
        const t = e.touches[0];
        const r = base.getBoundingClientRect();
        let x = t.clientX - r.left - r.width / 2;
        let y = t.clientY - r.top - r.height / 2;
        const dist = Math.sqrt(x*x + y*y);
        const limit = 45;

        if (dist > limit) { x *= limit/dist; y *= limit/dist; }
        knob.style.transform = `translate(${x}px, ${y}px)`;

        // Map to WASD
        const nextKeys = {
            w: y < -15,
            s: y > 15,
            a: x < -15,
            d: x > 15
        };

        for (let k in nextKeys) {
            if (nextKeys[k] !== activeKeys[k]) {
                emitKey(k, nextKeys[k] ? 'keydown' : 'keyup');
                activeKeys[k] = nextKeys[k];
            }
        }
    };

    base.ontouchstart = () => dragging = true;
    window.ontouchmove = handleJoystick;
    window.ontouchend = () => {
        dragging = false;
        knob.style.transform = 'translate(0,0)';
        for (let k in activeKeys) {
            if (activeKeys[k]) emitKey(k, 'keyup');
            activeKeys[k] = false;
        }
    };
</script>
</body>
</html>
